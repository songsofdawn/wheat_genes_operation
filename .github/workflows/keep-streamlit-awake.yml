name: Keep Streamlit App Awake

on:
  schedule:
    # GitHub Actions 的 cron 用的是 UTC 时间
    # 每 6 小时访问一次，避免超过 12 小时无流量
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          curl -A "Mozilla/5.0" \
            -L \
            --fail \
            --silent \
            --show-error \
            --max-time 120 \
            --connect-timeout 20 \
            --retry 3 \
            --retry-delay 10 \
            "https://wheatgenesoperation-96yfkzyzehlld67vb4vd3c.streamlit.app/" \
            > /dev/null
          echo "Streamlit app pinged successfully."