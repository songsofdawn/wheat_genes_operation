name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          echo "Ping time: $(date -u)"
          curl -A "Mozilla/5.0" \
            --silent \
            --show-error \
            --max-time 120 \
            --connect-timeout 20 \
            --retry 3 \
            --retry-delay 10 \
            -w "\nHTTP status: %{http_code}\nFinal URL: %{url_effective}\n" \
            "https://wheatgenesoperation-96yfkzyzehlld67vb4vd3c.streamlit.app/_stcore/health"
          echo "Ping finished."