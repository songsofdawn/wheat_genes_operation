name: Keep Streamlit App Awake

on:
  schedule:
    # 每 6 小时访问一次，GitHub Actions 使用 UTC 时间
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit health endpoint
        run: |
          curl -A "Mozilla/5.0" \
            --fail \
            --silent \
            --show-error \
            --max-time 120 \
            --connect-timeout 20 \
            --retry 3 \
            --retry-delay 10 \
            "https://wheatgenesoperation-96yfkzyzehlld67vb4vd3c.streamlit.app/_stcore/health"

          echo "Streamlit health endpoint pinged successfully."